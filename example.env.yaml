processing:
  directories:
    metadata: "data/metadata"
    output: "data/output"
    input: "data/input"
    extensions: "data/extensions"
    logs: "data/logs"
  postgres:
    dbname: "" # e.g., "mydatabase"
    user: "" # e.g., "myusername"
    password: "" # e.g., "mypassword"
    host: "" # e.g., "localhost"
    port: 5432
  osrm:
    enabled: true
    alternative_percentage: 20 # Percentage of requests to use the alternative route if available
  mergers:
    - gbfs:
        class: "GBFSMerger"
        config:
          input_data_dir_path_1: "" # Path to the directory containing the first GBFS dataset (e.g., "data/input/gbfs/berlin")
          input_data_dir_path_2: "" # Path to the directory containing the second GBFS dataset (e.g., "data/input/gbfs/hamburg")
          tmp_dir_path: "" # Path to a temporary directory for storing intermediate files during the merging process (e.g., "data/tmp/gbfs_merging")
          export_data_dir_path: "" # Path to the directory where the merged GBFS dataset should be exported (e.g., "data/output/gbfs/merged")
  transformers:
    - station_information:
        class: "StationInformation"
        config:
          operator: "" # e.g., "OperatorName"
          input_data_dir_path: "" # Path to the directory containing the station information data (e.g., "data/input/gbfs/berlin/station_information")
          export_data_dir_path: "" # Path to the directory where the transformed station information data should be exported (e.g., "data/output/gbfs/berlin/station_information")
    - free_bike_status:
        class: "FreeBikeStatus"
        config:
          operator: "" # e.g., "OperatorName"
          input_data_dir_path: "" # Path to the directory containing the free bike status data (e.g., "data/input/gbfs/berlin/free_bike_status")
          export_data_dir_path: "" # Path to the directory where the transformed free bike status data should be exported (e.g., "data/output/gbfs/berlin/free_bike_status")
    - geofencing_zones:
        class: "GeofencingZones"
        config:
          operator: "" # e.g., "OperatorName"
          input_data_dir_path: "" # Path to the directory containing the geofencing zones data (e.g., "data/input/gbfs/berlin/geofencing_zones")
          export_data_dir_path: "" # Path to the directory where the transformed geofencing zones data should be exported (e.g., "data/output/gbfs/berlin/geofencing_zones")
    - pricing_plans:
        class: "SystemPricingPlans"
        config:
          operator: "" # e.g., "OperatorName"
          input_data_dir_path: "" # Path to the directory containing the pricing plans data (e.g., "data/input/gbfs/berlin/pricing_plans")
          export_data_dir_path: "" # Path to the directory where the transformed pricing plans data should be exported (e.g., "data/output/gbfs/berlin/pricing_plans")
    - vehicle_types:
        class: "VehicleTypes"
        config:
          operator: "" # e.g., "OperatorName"
          input_data_dir_path: "" # Path to the directory containing the vehicle types data (e.g., "data/input/gbfs/berlin/vehicle_types")
          export_data_dir_path: "" # Path to the directory where the transformed vehicle types data should be exported (e.g., "data/output/gbfs/berlin/vehicle_types")
  processors: # Define your processors here
    # Example Processor Configuration:
    - OperatorName:
        class: "GBFS" # or "Tier", "Nextbike"
        steps: ["trips", "availability", "demand"]
        config:
          operator: "" # e.g., "OperatorName"
          gbfs_version: "3"
          network_names: [""] # e.g., ["berlin", "hamburg"]
          rotating: false # If true, the processor will rotate through the network names for each run instead of processing all at once
          network_mappings:
            CityName: "CODE" # e.g., "Berlin": "BER"
          stations: false
  extensions:
    - demographics:
        class: "Demographics-MA"
        config:
          file: "" # e.g., "data/input/demographics_ma.csv"
    - wfs:
        class: "WFS"
        config:
          wfs_name: "" # e.g., "gemeinden", "landkreise", "bezirke"
          wfs_url: "" # e.g., "https://www.govdata.de/OPENDATA/WFS?request=GetCapabilities&service=WFS"
          wfs_version: "" # e.g., "2.0.0"
          wfs_layer_name: "" # e.g., "gemeinden", "landkreise", "bezirke"
    - gtfs:
        class: GTFS
        config:
          cities: [""] # e.g., ["Berlin", "Hamburg"]
          num_processes: 1
    - bike-count-stations:
        class: "BikeCountStationsGermany"
        config:
          start_date: "" # YYYYMM
          end_date: "" # YYYYMM
          domain_names: [""] # e.g., ["berlin.de", "hamburg.de"]
    - geo:
        class: "Geo"
        config:
          enable_elevation: true
          elevation_dataset: "" # e.g., "srtm", "aster", "eudem"
          elevation_endpoint: "" # e.g., "localhost:8080/elevation"
    - osm:
        class: "OSM"
        config:
          cities: [""] # e.g., "Berlin", "Hamburg"
          years: [""] # e.g., "2020", "2021"
          tags: [""] # e.g., "building", "landuse", "amenity"
    - osm_landuse:
        class: "OSMLanduse"
        config:
          cities: [""] # e.g., "Berlin", "Hamburg"
    - foursquare:
        class: "Foursquare"
        config:
          api_key: "" # Your Foursquare API key
          cities: [] # e.g., ["Berlin", "Hamburg"]
    - holidays:
        class: "Holidays"
        config:
          from_date: "" # YYYY-MM-DD -- Can max range for 1000 days
          to_date: "" # YYYY-MM-DD
          country_iso_codes: [""] # e.g., "DE", "US"
    - weather:
        class: "Weather"
        config:
          weather_source: "" # e.g., "dwd", "openmeteo"
          locations: [""] # e.g., ["Berlin", "Hamburg"] or ["52.52,13.4050", "53.5511,9.9937"]
          start_date: "" # YYYYMMDD
          end_date: "" # YYYYMMDD
